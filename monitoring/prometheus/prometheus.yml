global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'distributed-rate-limiter'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets:
          - host.docker.internal:8080

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093